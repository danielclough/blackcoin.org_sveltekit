<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			http-equiv="Content-Security-Policy"
			content="default-src 'none'; script-src https://widgets.coingecko.com https://static.cloudflareinsights.com 'unsafe-inline'; connect-src https://*.coingecko.com https://cloudflareinsights.com; style-src 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src https://*.coingecko.com data:;"
		/>
		<script>
			(function () {
				var m = {},
					s = {
						getItem: function (k) {
							return Object.prototype.hasOwnProperty.call(m, k) ? m[k] : null;
						},
						setItem: function (k, v) {
							m[k] = '' + v;
						},
						removeItem: function (k) {
							delete m[k];
						},
						clear: function () {
							m = {};
						},
						key: function (i) {
							return Object.keys(m)[i] || null;
						},
						get length() {
							return Object.keys(m).length;
						}
					};
				try {
					sessionStorage.getItem('');
				} catch (e) {
					try {
						Object.defineProperty(window, 'sessionStorage', {
							get: function () {
								return s;
							},
							configurable: true
						});
					} catch (e2) {}
				}
			})();
		</script>
		<style>
			html,
			body {
				margin: 0;
				padding: 0;
				height: 280px;
				overflow: hidden;
				background: transparent;
			}
			gecko-coin-ticker-widget {
				display: block;
				height: 280px;
				overflow: hidden;
			}
		</style>
	</head>
	<body>
		<gecko-coin-ticker-widget
			locale="en"
			dark-mode="true"
			transparent-background="true"
			coin-id="blackcoin"
			initial-currency="usd"
		></gecko-coin-ticker-widget>
		<script src="https://widgets.coingecko.com/gecko-coin-ticker-widget.js"></script>
	</body>
</html>
