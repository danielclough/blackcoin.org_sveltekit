[build]
  command = "npm run build"
  publish = "build"

                                                                                                                                                 
# HTML — revalidate on every request but never no-store, so bfcache works                                                                              
[[headers]]                                                                                                                                            
  for = "/*.html"                                                                                                                                      
  [headers.values]                                                                                                                                     
    Cache-Control = "no-cache"                                                                                                                         
                                                                                                                                                       
# SvelteKit hashed assets are content-addressed — safe to cache forever                                                                                
[[headers]]                                                                                                                                            
  for = "/_app/immutable/*"                                                                                                                            
  [headers.values]                                                                                                                                     
    Cache-Control = "public, max-age=31536000, immutable"                                                                                              
                                                                                                                                                       
# Fonts and images are stable; one week is plenty                                                                                                      
[[headers]]                                                                                                                                            
  for = "/fonts/*"                                                                                                                                     
  [headers.values]                                                                                                                                     
    Cache-Control = "public, max-age=604800"                                                                                                           
                                                                                                                                                       
[[headers]]                                                                                                                                            
  for = "/images/*"                                                                                                                                    
  [headers.values]                                                                                                                                     
    Cache-Control = "public, max-age=604800"                                                                                                           
                                                                                                                                                       
# qrcode.min.js has no hash in its name — keep it short                                                                                                
[[headers]]                                                                                                                                            
  for = "/js/*"                                                                                                                                        
  [headers.values]                                                                                                                                     
    Cache-Control = "public, max-age=3600"    