<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<script>
			(function () {
				try {
					var t = localStorage.getItem('theme');
					if (t) document.documentElement.setAttribute('data-theme', t);
				} catch (e) {}
			})();
		</script>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta
			name="description"
			content="Blackcoin (BLK) — decentralised digital currency built on Proof of Stake 3.1 (PoSV3). Running since 2014."
		/>

		<meta property="og:title" content="Blackcoin – Pure Proof of Stake Since 2014" />
		<meta
			property="og:description"
			content="Blackcoin (BLK) is a decentralised digital currency built on Proof of Stake 3.1 (PoSV3). Running since 2014."
		/>
		<meta property="og:url" content="https://blackcoin.org" />
		<meta property="og:image" content="https://blackcoin.org/images/meta/blackcoin-cover.webp" />
		<meta property="og:site_name" content="Blackcoin" />
		<meta property="og:locale" content="en_US" />
		<meta property="og:type" content="website" />

		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Blackcoin – Pure Proof of Stake Since 2014" />
		<meta
			name="twitter:description"
			content="Blackcoin (BLK) — Proof of Stake 3.1 (PoSV3). Running since 2014."
		/>
		<meta name="twitter:site" content="@BlackcoinOrg" />
		<meta name="twitter:image" content="https://blackcoin.org/images/meta/blackcoin-cover.webp" />
		<meta name="twitter:creator" content="@BlackcoinOrg" />

		<link rel="icon" type="image/png" sizes="100x100" href="/favicon.png" />
		<title>Blackcoin – Pure Proof of Stake Since 2014</title>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div>%sveltekit.body%</div>
	</body>
</html>
